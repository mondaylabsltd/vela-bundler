[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Deterministic, cross-chain-portable creation code for CREATE2 deployment.
# - bytecode_hash = "none": drop the trailing solc metadata (IPFS) CBOR so the
#   creation code is a pure function of (source, solc, optimizer, evm_version).
#   The VelaGasSettlementSplitter address is derived off-chain in BOTH the bundler
#   and the wallet from this exact creation code; a metadata drift would change the
#   address and silently misroute the beneficiary payout.
# - evm_version = "paris": no PUSH0, so the same bytecode deploys on every chain
#   (including pre-Shanghai) via the deterministic CREATE2 factory.
bytecode_hash = "none"
evm_version = "paris"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
