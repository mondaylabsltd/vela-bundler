name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - name: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - name: macOS Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - name: Windows x86_64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
          - name: Windows arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Build release executable
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package executable
        id: package
        shell: bash
        env:
          ARCHIVE: ${{ matrix.archive }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          executable="vela-relay"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            executable="${executable}.exe"
          fi

          mkdir -p dist/package
          cp "target/${TARGET}/release/${executable}" "dist/package/${executable}"
          asset="vela-relay-${GITHUB_REF_NAME}-${TARGET}"

          if [[ "$ARCHIVE" == "zip" ]]; then
            powershell -NoProfile -Command "Compress-Archive -Path 'dist/package/${executable}' -DestinationPath 'dist/${asset}.zip' -Force"
            archive_path="dist/${asset}.zip"
          else
            tar -C dist/package -czf "dist/${asset}.tar.gz" "${executable}"
            archive_path="dist/${asset}.tar.gz"
          fi

          echo "asset_name=${asset}" >> "$GITHUB_OUTPUT"
          echo "archive_path=${archive_path}" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset_name }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Publish Docker image
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/vela-relay
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=vela-relay-image
          cache-to: type=gha,mode=max,scope=vela-relay-image

  publish:
    name: Publish GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum vela-relay-* > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --generate-notes
