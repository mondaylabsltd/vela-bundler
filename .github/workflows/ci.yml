# Minimal CI gate — mirrors the local checks documented in
# docs/project-takeover/02-local-development.md.
#
# No deployment coupling: the Worker deploys manually (`npx wrangler deploy` — see
# docs/project-takeover/05-deployment-runbook.md). CI green ≠ deployed; these jobs are
# the merge gate only.
#
# Deliberately NOT included:
#   - tests/integration_test.ts: self-skips (it.skipIf) when no bundler is listening on
#     localhost — it never runs here, only against a live stack.
#   - scripts/run-spec-tests.sh: boots a live `wrangler dev` + Anvil; run locally per the
#     runbook.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests (vitest — node + workers projects)
        run: npm test

  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evm_contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Forge tests
        run: forge test
