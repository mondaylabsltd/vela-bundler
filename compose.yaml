name: vela-relay

services:
  relay:
    image: ${VELA_RELAY_IMAGE:-vela-relay:local}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      VELA_RELAY_LISTEN_ADDR: 0.0.0.0:4567
    ports:
      - "${VELA_RELAY_PORT:-4567}:4567"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:4567/readyz"]
      interval: 15s
      timeout: 3s
      start_period: 20s
      retries: 3
